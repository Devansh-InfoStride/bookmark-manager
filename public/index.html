<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/search.css">
    <link rel="stylesheet" href="./styles/components/edit-bookmark.css">
    <link rel="stylesheet" href="./styles/components/pin-bookmark.css">
    <link rel="stylesheet" href="./styles/components/darkmode.css">
    <link rel="stylesheet" href="./styles/components/sort-bookmark.css">
    <link rel="stylesheet" href="./styles/components/export-bookmark.css">
</head>
<body>
    <div class="header">
        <h1>Bookmark Manager</h1>
    </div>

    <!-- Dark Mode Button -->
    <div class="theme-toggle-container">
        <button class ="theme-button" id="theme-toggle">Dark Mode</button>
    </div>

    <!-- ACTIONS CONTAINER (Search & Export) -->
    <div class="actions-container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search items...">
            <button id="searchBtn" type="button">Search</button>
        </div>
        <button class="export-button" onclick="exportToHTML()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Export HTML
        </button>
    </div>

    <!-- INPUT FORM -->
    <section class="form-section">
        <div class="form-container">
            <h2>Add New Bookmark</h2>
            <form id="bookmark-form">
                <div class="form-group">
                    <input
                        type="text"
                        id="bookmark-name"
                        placeholder="Enter bookmark name"
                        required
                    >
                </div>
                <div class="form-group">
                    <input
                        type="url"
                        id="bookmark-url"
                        placeholder="Enter URL (e.g., https://example.com)"
                        required
                    >
                </div>
                <div class="form-group">
                    <textarea
                        id="bookmark-description"
                        placeholder="Enter description"
                        rows="3"
                    ></textarea>
                </div>
                <button type="submit" class="add-button">Add Bookmark</button>
            </form>
        </div>
    </section>

    <!-- BOOKMARKS DISPLAY -->
    <section class="bookmarks-section">
        <div class="bookmarks-container">
            <h2>Your Bookmarks</h2>
            <div id="bookmarks-display" class="bookmarks-grid">
                <!-- Bookmark cards will be dynamically added here -->
                <div class="empty-state">
                    <p>No bookmarks yet. Add one to get started</p>
                </div>
            </div>
        </div>
    </section>

    <div id="edit-bookmark-modal-root"></div>

</body>
<script src="./scripts/components/pin-bookmark.js"></script>
<script src="./scripts/main.js"></script>
<script src="./scripts/components/edit-bookmark.js"></script>
<script src="./scripts/search.js"></script>
<script src="./scripts/components/darkmode.js"></script>
<script src="./scripts/components/sort-bookmark.js"></script>
<script src="./scripts/components/export-bookmark.js"></script>
</html>
